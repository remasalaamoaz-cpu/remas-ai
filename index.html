<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ريماس AI</title>

<style>
body{
    margin:0;
    font-family:Arial;
    background:linear-gradient(135deg,#000428,#004e92);
    color:white;
    display:flex;
    flex-direction:column;
    height:100vh;
}

header{
    padding:15px;
    text-align:center;
    background:rgba(0,0,0,0.5);
    font-size:22px;
    font-weight:bold;
}

#chat{
    flex:1;
    padding:10px;
    overflow-y:auto;
}

.msg{
    margin:10px 0;
    padding:10px;
    border-radius:10px;
    max-width:80%;
}

.user{
    background:#00c3ff;
    color:black;
    margin-right:auto;
}

.bot{
    background:#222;
    margin-left:auto;
}

#inputBox{
    display:flex;
    padding:10px;
    background:rgba(0,0,0,0.6);
}

input{
    flex:1;
    padding:10px;
    border:none;
    border-radius:5px;
}

button{
    padding:10px 15px;
    margin-right:10px;
    border:none;
    background:#00c3ff;
    cursor:pointer;
    border-radius:5px;
}
</style>

</head>

<body>

<header>🤖 ريماس AI</header>

<div id="chat"></div>

<div id="inputBox">
<input type="text" id="msg" placeholder="اكتب سؤالك هنا...">
<button onclick="send()">إرسال</button>
</div>

<script>
async function send(){
    let input = document.getElementById("msg");
    let text = input.value;
    if(!text) return;

    add(text,"user");
    input.value="";

    try{
        let res = await fetch("https://remas-ai.vercel.app/api/chat",{
            method:"POST",
            headers:{ "Content-Type":"application/json" },
            body:JSON.stringify({message:text})
        });

        let data = await res.json();

        add(data.reply || "مفيش رد حاليا","bot");

    }catch(e){
        add("حدث خطأ في السيرفر ❌","bot");
    }
}

function add(text,type){
    let div=document.createElement("div");
    div.className="msg "+type;
    div.innerText=text;
    document.getElementById("chat").appendChild(div);
}
</script>

</body>
</html>
