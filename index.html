<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ريماس AI ⚡</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#0b1220;
  color:white;
  height:100vh;
  display:flex;
  flex-direction:column;
}

/* الهيدر */
.topbar{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:12px 15px;
  background:#0f172a;
  border-bottom:1px solid #1f2937;
}

.left{
  font-weight:bold;
  font-size:13px;
  opacity:0.9;
}

.right{
  display:flex;
  align-items:center;
  gap:10px;
  font-weight:bold;
}

.logo{
  width:45px;
  height:45px;
  border-radius:50%;
  object-fit:cover;
  border:2px solid #3b82f6;
  box-shadow:0 0 10px #3b82f6;
  transition:0.3s;
}

.logo:hover{
  transform:scale(1.1);
}

/* الشات */
#chat{
  flex:1;
  padding:15px;
  overflow-y:auto;
}

/* الرسائل */
.msg{
  margin:10px 0;
  padding:12px;
  border-radius:12px;
  max-width:75%;
  line-height:1.6;
  font-size:15px;
  animation:fadeIn 0.2s ease-in;
}

@keyframes fadeIn{
  from{opacity:0; transform:translateY(10px);}
  to{opacity:1; transform:translateY(0);}
}

.user{
  background:#2563eb;
  margin-left:auto;
}

.bot{
  background:#1f2937;
  margin-right:auto;
}

/* typing */
.typing{
  font-size:13px;
  opacity:0.6;
  margin:5px 0;
}

/* الإدخال */
#inputBox{
  display:flex;
  padding:10px;
  background:#0f172a;
  border-top:1px solid #1f2937;
}

input{
  flex:1;
  padding:12px;
  border:none;
  border-radius:10px;
  outline:none;
  background:#111827;
  color:white;
}

button{
  margin-right:10px;
  padding:12px 18px;
  background:#3b82f6;
  color:white;
  border:none;
  border-radius:10px;
  cursor:pointer;
  font-weight:bold;
}

button:hover{
  background:#2563eb;
}
</style>
</head>

<body>

<header class="topbar">

  <div class="left">
    👨‍💻 المبرمج: ريماس علاء معاذ
  </div>

  <div class="right">
    <img src="masa.jpg" class="logo">
    🤖 ريماس AI
  </div>

</header>

<div id="chat"></div>

<div id="inputBox">
  <input id="msg" placeholder="اسأل أي حاجة...">
  <button onclick="send()">إرسال</button>
</div>

<script>

let typingDiv;

async function send(){
  let input = document.getElementById("msg");
  let text = input.value;
  if(!text) return;

  add(text,"user");
  input.value="";

  showTyping();

  try{
    let res = await fetch("https://remas-ai.vercel.app/api/chat", {
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body:JSON.stringify({message:text})
    });

    let data = await res.json();

    hideTyping();
    add(data.reply,"bot");

  }catch(e){
    hideTyping();
    add("خطأ في الاتصال ❌","bot");
  }
}

function add(text,type){
  let div=document.createElement("div");
  div.className="msg "+type;
  div.textContent=text;
  document.getElementById("chat").appendChild(div);
  document.getElementById("chat").scrollTop = 999999;
}

/* ⏳ typing effect */
function showTyping(){
  typingDiv=document.createElement("div");
  typingDiv.className="typing";
  typingDiv.textContent="ريماس AI يكتب...";
  document.getElementById("chat").appendChild(typingDiv);
}

function hideTyping(){
  if(typingDiv){
    typingDiv.remove();
  }
}

</script>

</body>
</html>
