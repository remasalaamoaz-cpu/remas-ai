<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ريماس AI ⚡</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#0b1220;
  color:white;
  height:100vh;
  display:flex;
  flex-direction:column;
}

/* الهيدر */
.topbar{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:12px;
  background:#0f172a;
  border-bottom:1px solid #1f2937;
}

.left{
  font-size:13px;
  font-weight:bold;
}

.right{
  display:flex;
  align-items:center;
  gap:10px;
}

.logo{
  width:42px;
  height:42px;
  border-radius:50%;
  object-fit:cover;
}

/* الشات */
#chat{
  flex:1;
  padding:15px;
  overflow-y:auto;
}

.msg{
  margin:10px 0;
  padding:12px;
  border-radius:12px;
  max-width:75%;
}

.user{
  background:#2563eb;
  margin-left:auto;
}

.bot{
  background:#1f2937;
  margin-right:auto;
}

/* شريط الإدخال */
#inputBox{
  display:flex;
  align-items:center;
  padding:10px;
  background:#0f172a;
  gap:8px;
}

/* input */
input{
  flex:1;
  padding:12px;
  border:none;
  border-radius:10px;
  outline:none;
  background:#111827;
  color:white;
}

/* الأزرار */
.btn{
  width:42px;
  height:42px;
  border:none;
  border-radius:10px;
  background:#1f2937;
  color:white;
  cursor:pointer;
  font-size:18px;
}

.send{
  background:#3b82f6;
}

/* file hidden */
#fileInput{
  display:none;
}
</style>
</head>

<body>

<header class="topbar">

  <div class="left">
    👨‍💻 ريماس علاء معاذ
  </div>

  <div class="right">
    <img src="masa.jpg" class="logo">
    🤖 ريماس AI
  </div>

</header>

<div id="chat"></div>

<!-- input area -->
<div id="inputBox">

  <!-- زر + رفع ملفات -->
  <button class="btn" onclick="document.getElementById('fileInput').click()">+</button>
  <input type="file" id="fileInput" accept="image/*">

  <!-- input -->
  <input id="msg" placeholder="اكتب سؤالك...">

  <!-- مايك -->
  <button class="btn" onclick="startMic()">🎤</button>

  <!-- إرسال -->
  <button class="btn send" onclick="send()">➤</button>

</div>

<script>

let history=[];

/* إرسال */
async function send(){
  let input=document.getElementById("msg");
  let text=input.value;
  if(!text) return;

  add(text,"user");
  input.value="";

  try{
    let res=await fetch("https://remas-ai.vercel.app/api/chat",{
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body:JSON.stringify({message:text})
    });

    let data=await res.json();
    add(data.reply,"bot");

  }catch(e){
    add("خطأ في الاتصال ❌","bot");
  }
}

/* إضافة رسالة */
function add(text,type){
  let div=document.createElement("div");
  div.className="msg "+type;
  div.textContent=text;
  document.getElementById("chat").appendChild(div);
  document.getElementById("chat").scrollTop=999999;
}

/* مايك */
function startMic(){
  let SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
  if(!SpeechRecognition){
    alert("المتصفح لا يدعم المايك");
    return;
  }

  let rec = new SpeechRecognition();
  rec.lang = "ar-EG";

  rec.start();

  rec.onresult = function(event){
    document.getElementById("msg").value = event.results[0][0].transcript;
  }
}

/* رفع ملفات */
document.getElementById("fileInput").addEventListener("change", function(e){
  let file = e.target.files[0];
  if(!file) return;

  add("📎 تم رفع ملف: " + file.name,"bot");
});

</script>

</body>
</html>
