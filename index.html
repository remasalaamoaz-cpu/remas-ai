<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rimas AI | ريماس</title>

<style>
body{
  margin:0;
  font-family: Arial;
  background: radial-gradient(circle at top right, #000428, #004e92);
  color:#fff;
}

header{
  text-align:center;
  padding:20px;
  background:rgba(0,0,0,0.6);
  color:#00e5ff;
  font-size:22px;
  font-weight:bold;
}

.chat-box{
  max-width:800px;
  margin:40px auto;
  background:rgba(0,0,0,0.4);
  padding:15px;
  border-radius:15px;
  box-shadow:0 0 20px #00c3ff;
}

#chat{
  height:420px;
  overflow:auto;
  background:#111;
  padding:10px;
  border-radius:10px;
}

.msg{
  margin:10px 0;
  padding:10px;
  border-radius:8px;
}

.user{background:#00c853;text-align:right;}
.bot{background:#333;text-align:left;}

.input-area{
  display:flex;
  gap:10px;
  margin-top:15px;
}

input{
  flex:1;
  padding:12px;
  border:none;
  border-radius:8px;
}

button{
  padding:12px 15px;
  background:#00c3ff;
  border:none;
  border-radius:8px;
  cursor:pointer;
  font-weight:bold;
}

@media(max-width:768px){
  .input-area{flex-direction:column;}
}
</style>
</head>

<body>

<header>💎 Rimas AI | الذكاء الاصطناعي الحقيقي</header>

<div class="chat-box">

  <div id="chat"></div>

  <div class="input-area">
    <input id="msg" placeholder="اكتب أي سؤال...">
    <button onclick="sendMsg()">إرسال</button>
  </div>

</div>

<script>
async function sendMsg(){

  let input = document.getElementById("msg");
  let chat = document.getElementById("chat");

  if(input.value.trim()=="") return;

  let text = input.value;

  chat.innerHTML += `<div class='msg user'>👤 ${text}</div>`;
  input.value="";

  chat.innerHTML += `<div class='msg bot'>🤖 جاري التفكير...</div>`;

  try{

    let res = await fetch("https://YOUR-VERCEL-API.vercel.app/api/chat", {
      method:"POST",
      headers:{
        "Content-Type":"application/json"
      },
      body: JSON.stringify({message:text})
    });

    let data = await res.json();

    chat.innerHTML += `<div class='msg bot'>🤖 ${data.reply}</div>`;
    chat.scrollTop = chat.scrollHeight;

  }catch(e){

    chat.innerHTML += `<div class='msg bot'>⚠️ السيرفر غير متاح مؤقتًا</div>`;
  }
}
</script>

</body>
</html>
