<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ريماس AI</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #0f172a;
  color: white;
  display: flex;
  flex-direction: column;
  height: 100vh;
}

header {
  padding: 15px;
  text-align: center;
  background: #111827;
  font-size: 22px;
  font-weight: bold;
}

#chat {
  flex: 1;
  padding: 10px;
  overflow-y: auto;
}

.msg {
  margin: 8px 0;
  padding: 10px;
  border-radius: 10px;
  max-width: 80%;
}

.user {
  background: #3b82f6;
  margin-left: auto;
}

.bot {
  background: #1f2937;
  margin-right: auto;
}

#inputBox {
  display: flex;
  padding: 10px;
  background: #111827;
}

input {
  flex: 1;
  padding: 12px;
  border: none;
  border-radius: 8px;
}

button {
  margin-right: 10px;
  padding: 12px 18px;
  border: none;
  background: #3b82f6;
  color: white;
  border-radius: 8px;
  cursor: pointer;
}
</style>
</head>

<body>

<header>🤖 ريماس AI - احترافي</header>

<div id="chat"></div>

<div id="inputBox">
  <input id="msg" placeholder="اكتب سؤالك...">
  <button onclick="send()">إرسال</button>
</div>

<script>
async function send(){
  let input = document.getElementById("msg");
  let text = input.value;
  if(!text) return;

  add(text, "user");
  input.value = "";

  try {
    let res = await fetch("/api/chat", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ message: text })
    });

    let data = await res.json();
    add(data.reply, "bot");

  } catch (e) {
    add("خطأ في الاتصال ❌", "bot");
  }
}

function add(text, type){
  let div = document.createElement("div");
  div.className = "msg " + type;
  div.innerText = text;
  document.getElementById("chat").appendChild(div);
}
</script>

</body>
</html>
