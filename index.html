<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ريماس AI ⚡</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #0b1220;
  color: white;
  height: 100vh;
  display: flex;
  flex-direction: column;
}

/* الهيدر */
.topbar{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:12px 15px;
  background:#111827;
  font-size:16px;
}

.left{
  font-weight:bold;
  color:#fff;
}

.right{
  display:flex;
  align-items:center;
  gap:8px;
  font-weight:bold;
  color:#fff;
}

.logo{
  width:32px;
  height:32px;
  border-radius:50%;
  object-fit:cover;
}

/* الشات */
#chat {
  flex: 1;
  padding: 10px;
  overflow-y: auto;
}

.msg {
  margin: 8px 0;
  padding: 10px;
  border-radius: 10px;
  max-width: 80%;
}

.user {
  background: #2563eb;
  margin-left: auto;
}

.bot {
  background: #1f2937;
  margin-right: auto;
}

/* الإدخال */
#inputBox {
  display: flex;
  padding: 10px;
  background: #111827;
}

input {
  flex: 1;
  padding: 12px;
  border: none;
  border-radius: 8px;
}

button {
  margin-right: 10px;
  padding: 12px 18px;
  background: #3b82f6;
  color: white;
  border: none;
  border-radius: 8px;
  cursor: pointer;
}
</style>
</head>

<body>

<header class="topbar">
  <div class="left">
    👨‍💻 المبرمج: ريماس علاء معاذ
  </div>

  <div class="right">
    <img src="logo.png" class="logo">
    🤖 ريماس AI
  </div>
</header>

<div id="chat"></div>

<div id="inputBox">
  <input id="msg" placeholder="اكتب سؤالك...">
  <button onclick="send()">إرسال</button>
</div>

<script>
let history = [];

async function send(){
  let input = document.getElementById("msg");
  let text = input.value;
  if(!text) return;

  add(text, "user");
  input.value = "";

  history.push({ role: "user", content: text });

  try {
    let res = await fetch("/api/chat", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ message: text, history })
    });

    let data = await res.json();

    add(data.reply, "bot");

    history.push({ role: "assistant", content: data.reply });

  } catch (e) {
    add("خطأ في الاتصال ❌", "bot");
  }
}

function add(text, type){
  let div = document.createElement("div");
  div.className = "msg " + type;
  div.innerText = text;
  document.getElementById("chat").appendChild(div);
}
</script>

</body>
</html>
