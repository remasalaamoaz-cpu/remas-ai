<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ريماس AI</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#0b1220;
  color:white;
  height:100vh;
  display:flex;
  flex-direction:column;
}

.topbar{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:12px 15px;
  background:#0f172a;
  border-bottom:1px solid #1f2937;
}

.left{
  font-weight:bold;
  font-size:14px;
}

.right{
  display:flex;
  align-items:center;
  gap:10px;
  font-weight:bold;
}

.logo{
  width:40px;
  height:40px;
  border-radius:50%;
  object-fit:cover;
}

#chat{
  flex:1;
  padding:15px;
  overflow-y:auto;
}

.msg{
  margin:10px 0;
  padding:10px;
  border-radius:10px;
  max-width:75%;
}

.user{
  background:#2563eb;
  margin-left:auto;
}

.bot{
  background:#1f2937;
  margin-right:auto;
}

#inputBox{
  display:flex;
  padding:10px;
  background:#0f172a;
}

input{
  flex:1;
  padding:12px;
  border:none;
  border-radius:10px;
  outline:none;
}

button{
  margin-right:10px;
  padding:12px 18px;
  background:#3b82f6;
  color:white;
  border:none;
  border-radius:10px;
  cursor:pointer;
}
</style>
</head>

<body>

<header class="topbar">

  <div class="left">
    👨‍💻 المبرمج: ريماس علاء معاذ
  </div>

  <div class="right">
    <img src="masse.jpg" class="logo">
    🤖 ريماس AI
  </div>

</header>

<div id="chat"></div>

<div id="inputBox">
  <input id="msg" placeholder="اسأل أي حاجة...">
  <button onclick="send()">إرسال</button>
</div>

<script>
async function send(){
  let input = document.getElementById("msg");
  let text = input.value;
  if(!text) return;

  add(text,"user");
  input.value="";

  try{
    let res = await fetch("/api/chat",{
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body:JSON.stringify({message:text})
    });

    let data = await res.json();
    add(data.reply,"bot");

  }catch(e){
    add("خطأ في الاتصال ❌","bot");
  }
}

function add(text,type){
  let div=document.createElement("div");
  div.className="msg "+type;
  div.textContent=text;
  document.getElementById("chat").appendChild(div);
}
</script>

</body>
</html>
